version: '3'
services:
  mysql:
    image: mysql:8
    networks:
      - simplepay_network
    volumes:
      - ./db/conf.d:/etc/mysql/conf.d
      - ./db/data:/var/lib/mysql
      - ./db/initdb.d:/docker-entrypoint-initdb.d
    env_file: .env
    ports:
      - "3306:3306"
    restart: always

  member-service:
    image: simple-pay-member-service:0.0.1-SNAPSHOT
    networks:
      - simplepay_network
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    env_file:
      - .env

  banking-service:
    image: simple-pay-banking-service:0.0.1-SNAPSHOT
    networks:
      - simplepay_network
    ports:
      - "8082:8080"
    depends_on:
      - mysql
    env_file:
      - .env

networks:
  simplepay_network:
    driver: bridge
